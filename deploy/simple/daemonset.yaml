apiVersion: v1
kind: Namespace
metadata:
  name: gpusprint-system
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: gpusprint-sa
  namespace: gpusprint-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: gpusprint-role
rules:
- apiGroups: [""]
  resources: ["pods", "nodes"]
  verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: gpusprint-rolebinding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: gpusprint-role
subjects:
- kind: ServiceAccount
  name: gpusprint-sa
  namespace: gpusprint-system
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: gpusprint
  namespace: gpusprint-system
  labels:
    app: gpusprint
spec:
  selector:
    matchLabels:
      app: gpusprint
  template:
    metadata:
      labels:
        app: gpusprint
    spec:
      serviceAccountName: gpusprint-sa
      hostPID: true
      containers:
      - name: gpusprint
        image: gpusprint:local
        imagePullPolicy: Never    # Use local image from minikube
        env:
        - name: NODE_NAME
          valueFrom:
            fieldRef:
              fieldPath: spec.nodeName
        - name: DEVELOPMENT_MODE
          value: "true"
        - name: LOG_LEVEL
          value: "info"
        - name: SAMPLE_INTERVAL
          value: "15s"
        - name: PUBSUB_ENABLED
          value: "false"
        - name: PUBSUB_PROJECT
          value: "gpusprint-dev"
        - name: PUBSUB_HARDWARE_TOPIC
          value: "gpu-hardware-topic"
        - name: PUBSUB_ALLOCATION_TOPIC
          value: "gpu-allocation-topic"
        - name: OTLP_ENABLED
          value: "true"
        - name: OTLP_ENDPOINT
          value: "otel-collector.gpusprint-system.svc.cluster.local:4317"
        - name: GOOGLE_APPLICATION_CREDENTIALS
          value: "/var/run/secrets/gcp/key.json"
        volumeMounts:
        - name: kubelet-sockets
          mountPath: /var/lib/kubelet/pod-resources
          readOnly: true
        - name: gcp-key
          mountPath: /var/run/secrets/gcp
          readOnly: true
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 256Mi
      volumes:
      - name: kubelet-sockets
        hostPath:
          path: /var/lib/kubelet/pod-resources
          type: DirectoryOrCreate
      - name: gcp-key
        secret:
          secretName: gpusprint-exporter-key
