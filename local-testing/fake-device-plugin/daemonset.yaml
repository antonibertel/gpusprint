# Fake GPU device plugin for local testing.
#
# Registers fake nvidia.com/gpu devices with the kubelet so that pods
# requesting GPUs can be scheduled on nodes without real hardware.
# The kubelet's pod-resources API will then report real device→pod mappings,
# which gpusprint reads via its normal (non-simulated) code path.
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: fake-gpu-device-plugin
  namespace: kube-system
  labels:
    app: fake-gpu-device-plugin
spec:
  selector:
    matchLabels:
      app: fake-gpu-device-plugin
  template:
    metadata:
      labels:
        app: fake-gpu-device-plugin
    spec:
      priorityClassName: system-node-critical
      containers:
      - name: plugin
        image: fake-gpu-device-plugin:local
        imagePullPolicy: Never
        env:
        - name: NUM_GPUS
          value: "12"
        resources:
          requests:
            cpu: 5m
            memory: 8Mi
          limits:
            cpu: 20m
            memory: 16Mi
        volumeMounts:
        - name: device-plugins
          mountPath: /var/lib/kubelet/device-plugins
        securityContext:
          readOnlyRootFilesystem: true
          privileged: false
      volumes:
      - name: device-plugins
        hostPath:
          path: /var/lib/kubelet/device-plugins
