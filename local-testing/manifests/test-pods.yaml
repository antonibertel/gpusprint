# Test workloads for local GPU testing.
# 10 nodes × 12 GPUs = 120 GPUs total. ~60 allocated, ~50% free.
#
#   Job          — llm-pretrain: 3 × 4 GPU = 12
#   Job          — rag-pipeline: 2 × 2 GPU = 4
#   StatefulSet  — notebooks: 8 × 1 GPU = 8
#   Deployment   — inference-prod: 10 × 1 GPU = 10
#   Deployment   — inference-heavy: 3 × 2 GPU = 6
#   Deployment   — inference-canary: 2 × 1 GPU = 2
#   CronJob      — video-encoder: 1 × 1 GPU = 1
#   Job          — nightly-etl: 5 × 1 GPU = 5
#   StatefulSet  — model-server: 3 × 2 GPU = 6
#   Deployment   — embedding-api: 6 × 1 GPU = 6
#   Job          — eval-suite: 3 × 1 GPU = 3
# Total: 63 GPUs

apiVersion: batch/v1
kind: Job
metadata:
  name: llm-pretrain
  namespace: default
  labels:
    app.kubernetes.io/name: llm-pretrain
spec:
  completions: 3
  parallelism: 3
  template:
    metadata:
      labels:
        app.kubernetes.io/name: llm-pretrain
        team: ml-platform
        owner: alice
    spec:
      restartPolicy: Never
      containers:
      - name: trainer
        image: alpine:3.21
        command: ["sleep", "infinity"]
        resources:
          limits:
            nvidia.com/gpu: "4"
---
apiVersion: batch/v1
kind: Job
metadata:
  name: rag-pipeline
  namespace: default
  labels:
    app.kubernetes.io/name: rag-pipeline
spec:
  completions: 2
  parallelism: 2
  template:
    metadata:
      labels:
        app.kubernetes.io/name: rag-pipeline
        team: data-eng
        owner: eve
    spec:
      restartPolicy: Never
      containers:
      - name: embedder
        image: alpine:3.21
        command: ["sleep", "infinity"]
        resources:
          limits:
            nvidia.com/gpu: "2"
---
