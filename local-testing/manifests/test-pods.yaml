---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: video-encoder
  namespace: default
  labels:
    app.kubernetes.io/name: video-encoder
spec:
  schedule: "*/5 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      template:
        metadata:
          labels:
            app.kubernetes.io/name: video-encoder
            team: media
            owner: dave
        spec:
          restartPolicy: Never
          containers:
          - name: encoder
            image: alpine:3.21
            command: ["sleep", "240"]
            resources:
              limits:
                nvidia.com/gpu: "1"
